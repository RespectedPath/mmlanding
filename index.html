<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --mint: #4FBFA0;
    --mint-dark: #3A9E84;
    --charcoal: #1C1C22;
    --charcoal-mid: #4A4A55;
    --charcoal-light: #9898A4;
    --white: #F8F8FA;
  }

  body {
    font-family: 'Outfit', system-ui, sans-serif;
    background: var(--white);
    color: var(--charcoal);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 2rem;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 3.5rem;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--mint-dark);
    margin-bottom: 1.5rem;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--mint);
    animation: pulse 2.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  h1 {
    font-family: 'Outfit', system-ui, sans-serif;
    font-size: clamp(2rem, 4.5vw, 3rem);
    font-weight: 600;
    line-height: 1.15;
    letter-spacing: -0.02em;
    text-align: center;
    color: var(--charcoal);
    margin-bottom: 1.25rem;
    max-width: 480px;
  }

  h1 em {
    font-style: normal;
    color: var(--mint);
  }

  p {
    font-size: 16px;
    font-weight: 300;
    color: var(--charcoal-mid);
    line-height: 1.7;
    text-align: center;
    max-width: 380px;
  }

  footer {
    position: fixed;
    bottom: 2rem;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 13px;
    color: var(--charcoal-light);
  }

  footer a {
    color: var(--charcoal-light);
    text-decoration: none;
  }

  footer a:hover { color: var(--mint-dark); }
</style>
</head>
